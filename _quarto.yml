# Default author
author:
  - name:
      given: "A. J."
      family: "Smit"
    url: https://tangledbank.netlify.app
    affiliation: University of the Western Cape
    affiliation-url: https://uwc.ac.za
    orcid: 0000-0002-3799-6126

copyright:
  holder: "Smit, A. J."
  year: 2026

bibliography: references.bib
citation: true
csl: styles/marine-biology.csl
funding: "The author received no specific funding for this work."
language:
  title-block-published: "Published"
  title-block-modified: "Last updated"
  search-text-placeholder: "Search concepts, chapters, and tasks"
license: "CC BY-NC-SA"
lightbox: auto
title-block-banner: false
title-block-style: default

execute:
  cache: true
  freeze: auto
  echo: true
  message: false
  warning: false

format:
  html:
    anchor-sections: true
    citations-hover: true
    code-block-bg: true
    code-copy: true
    code-fold: false
    code-overflow: scroll
    code-line-numbers: true
    code-link: true
    code-tools: true
    crossrefs-hover: true
    css:
      - styles/base.css
      - styles/typography-current.css
    # df-print: kable
    embed-resources: false
    fig-align: center
    fig-height: 4.0
    fig-width: 5.5
    # out-width: "75%"
    fig-format: svg
    fig-cap-location: bottom
    fig-dpi: 300
    fontsize: 1.0em
    footnotes-hover: true
    grid:
      sidebar-width: 250px
      body-width: 950px
      margin-width: 250px
      gutter-width: 1.5rem
    highlight-style: github
    html-math-method: mathjax
    include-after-body: includes/course-nav.html
    link-external-icon: true
    link-external-newwindow: true
    number-depth: 3
    number-sections: true
    page-layout: article
    reference-location: document
    self-contained: false
    smooth-scroll: true
    tbl-cap-location: top
    tbl-colwidths: false
    theme:
      light: flatly
      dark: darkly
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "On this page"

website:
  title: "The Tangled Bank"
  description: "UWC's Biodiversity & Conservation Biology Department Pages For BDC223, BDC334, BCB743, and BCB744."
  favicon: "images/favicon.ico"
  site-url: https://tangledbank.netlify.app
  repo-url: https://github.com/ajsmit/tangled_bank
  repo-branch: main
  google-analytics: G-SCYH68M489
  announcement:
    icon: info-circle
    dismissable: true
    content: "**March 2026 updated biostats pages are live.** Module materials are updated throughout the term; use the section menus above to jump directly to course content."
    type: primary
    position: below-navbar
  bread-crumbs: true
  # Keep this list in sync with local notes such as BCB744/basic_stats/README_progress.md.
  drafts: []
  draft-mode: gone
  cookie-consent:
    type: express
    style: headline
    palette: light
  search:
    location: navbar
    type: textbox
    limit: 25
    collapse-after: 3
    copy-button: true
    show-item-context: tree
    keyboard-shortcut: ["/"]
  open-graph: true
  page-navigation: true
  repo-actions: [edit, issue]
  reader-mode: true
  page-footer:
    left: "© 2026, AJ Smit"
    background: light

