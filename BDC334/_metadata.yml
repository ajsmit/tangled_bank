# Freeze computed outputs
freeze: true

# Enable banner style title blocks
title-block-banner: false

# Enable CC licence appendix
license: "CC BY"

# Default for table of contents
toc: true
toc-title: Table of contents
toc-location: left

# Default knitr options
execute:
  echo: true
  message: false
  warning: false

# Default author
author:
  - name: Prof. AJ Smit
    url: https://ajsmit.netlify.app
    affiliation: University of the Western Cape
    affiliation-url: https://uwc.ac.za
    orcid: 0000-0002-3799-6126

# Default fields for citation
citation: true
