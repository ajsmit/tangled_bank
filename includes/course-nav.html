<script>
document.addEventListener("DOMContentLoaded", function () {
  const sidebar = document.querySelector("#quarto-sidebar");
  const titleBlock = document.querySelector(".quarto-title-block");
  const mainContent = document.querySelector("main.content");
  if (!sidebar || !titleBlock || !mainContent) return;

  const prevLink = document.querySelector('link[rel="prev"]');
  const nextLink = document.querySelector('link[rel="next"]');
  const overviewLink = sidebar.querySelector(".sidebar-item a.sidebar-link[href]");

  if (!prevLink && !nextLink && !overviewLink) return;

  const topNav = document.createElement("nav");
  topNav.className = "course-page-nav course-page-nav-top";
  topNav.setAttribute("aria-label", "Course page navigation");

  const navItem = (href, label, kind) => {
    if (!href) {
      return '<span class="course-page-nav-item is-disabled">' + label + "</span>";
    }
    return '<a class="course-page-nav-item course-page-nav-' + kind + '" href="' + href + '">' + label + "</a>";
  };

  const overviewHref = overviewLink ? overviewLink.getAttribute("href") : null;
  const leftNav =
    navItem(prevLink ? prevLink.getAttribute("href") : null, "Previous", "previous") +
    navItem(overviewHref, "Overview", "overview") +
    navItem(nextLink ? nextLink.getAttribute("href") : null, "Next", "next");

  topNav.innerHTML =
    '<div class="course-page-nav-left">' + leftNav + '</div>' +
    '<div class="course-page-nav-right"></div>';

  titleBlock.insertAdjacentElement("afterend", topNav);

  const currentPath = window.location.pathname || "";
  const isBiostatsChapter =
    /\/BCB744\/basic_stats\/\d{2}-[^/]+\.html$/.test(currentPath);

  if (!isBiostatsChapter) return;

  const pdfHref = currentPath.replace(/\.html$/, ".pdf");
  const pdfIcon =
    '<svg class="course-page-nav-pdf-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">' +
    '<path d="M7 2h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm7 1.5V8h4.5"/>' +
    '<path d="M8 16.5h1.6c1.2 0 2-.7 2-1.8s-.8-1.8-2-1.8H8v3.6zm1.4-2.4c.5 0 .8.3.8.6s-.3.6-.8.6h-.2v-1.2h.2zM13 16.5h1.4c1.5 0 2.4-.7 2.4-1.8s-.9-1.8-2.4-1.8H13v3.6zm1.4-2.4c.7 0 1.1.3 1.1.6s-.4.6-1.1.6h-.2v-1.2h.2zM18 12.9h3v1.2h-1.7v.2h1.5v1.1h-1.5v1.1H18v-3.6z"/>' +
    "</svg>";

  const rightNav = topNav.querySelector(".course-page-nav-right");
  if (!rightNav) return;
  rightNav.innerHTML =
    '<a class="course-page-nav-item course-page-nav-pdf" href="' +
    pdfHref +
    '" title="Open PDF version" aria-label="Open PDF version">' +
    pdfIcon +
    '<span>PDF</span></a>';
});
</script>
